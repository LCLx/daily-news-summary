name: Daily News Summary

on:
  schedule:
    # Daily at 07:00 PST (UTC 15:00); shifts to 08:00 during PDT
    - cron: '0 15 * * *'
  workflow_dispatch:  # Allow manual trigger

permissions:
  id-token: write
  contents: read

jobs:
  generate-summary:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Configure AWS credentials
        if: vars.BACKEND == 'BEDROCK_CLAUDE'
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: daily-news-summary-${{ github.run_id }}

      - name: Install dependencies
        run: uv sync

      - name: Generate and send summary
        env:
          BACKEND: ${{ vars.BACKEND }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          MODEL: ${{ vars.MODEL }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: uv run src/pipelines/email_pipeline.py
